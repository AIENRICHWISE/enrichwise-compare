# ───────────────────────────────────────────────────────────────────────────
# Insurance Comparison tool — STATIC site on the existing Lightsail box,
# served under the tools.enrichwise.co.in HTTPS server block alongside the
# other static tools (followmeter / salesometer / kj-meter / rmdesk).
#
# This block is inserted automatically by deploy/apply_integration.py just
# before the `location ~ /\. { deny all; }` line. No PM2 / Node — nginx serves
# the single HTML file straight from disk. It inherits the server-level office
# IP allowlist (no `allow all;`), so it's internal-only like the sibling tools.
#
# Live at: https://tools.enrichwise.co.in/insurance-compare/
# ───────────────────────────────────────────────────────────────────────────

location /insurance-compare/ {
    alias /var/www/enrichwise-tools/insurance-compare/;
    try_files $uri $uri/ /insurance-compare/index.html;
    expires 5m;
    add_header Cache-Control "public, must-revalidate";
}
