# ───────────────────────────────────────────────────────────────────────────
# Enrichwise Insurance Comparison tool — STATIC site on the existing Lightsail
# box (same nginx server block as the Kavach dashboard).
#
# Append this block INSIDE the existing `server { ... }` block for
# tools.enrichwise.co.in (the file with the `/kavach/wa-tracking/` location).
#
# Unlike the Kavach dashboard, this is a single static HTML file — NO PM2, NO
# Node process, NO proxy_pass. nginx serves it straight from disk.
#
# Files are git-cloned to /var/www/enrichwise-compare (see README-lightsail.md).
# After editing this server block:  sudo nginx -t && sudo systemctl reload nginx
#
# Result:  https://tools.enrichwise.co.in/kavach/compare/
# ───────────────────────────────────────────────────────────────────────────

location /kavach/compare/ {
    # Override the server-level `deny all;` — every public location opts back in.
    allow all;

    alias /var/www/enrichwise-compare/;
    index index.html;

    # Single-page tool: fall back to index.html for any sub-path.
    try_files $uri $uri/ /kavach/compare/index.html;

    # Static asset caching (the HTML itself is tiny; revalidate so updates show).
    add_header Cache-Control "no-cache";
}

# Redirect the bare path (no trailing slash) so the alias resolves correctly.
location = /kavach/compare {
    return 301 /kavach/compare/;
}
